name: fuse nebulae

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fuse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download LÖVE 12.0
        run: |
          curl -L -o love-win64.zip https://coolestperson.me/public/love-12.0-win64.zip

      - name: Unzip LÖVE 12.0
        run: |
          unzip love-win64.zip -d love12

      - name: Create .love archive
        run: |
          mkdir build
          zip -r build/game.love *.lua src ui lib config

      - name: Fuse .love into EXE
        run: |
          cat love12/love.exe build/game.love > build/Nebulae.exe

      - name: Copy DLLs and folders
        run: |
          cp love12/*.dll build/
          cp -r assets build/
          cp -r plugins build/

      - name: Zip final build
        run: |
          cd build
          zip -r ../fused-game.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v3.1.3
        with:
          name: fused-windows-game
          path: fused-game.zip