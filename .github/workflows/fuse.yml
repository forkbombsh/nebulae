name: build nebulae

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fuse-windows:
    runs-on: ubuntu-22.04
    name: Build for Windows

    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: download love 12.0 for Windows
        run: curl -L -o love-win64.zip https://coolestperson.me/public/love-12.0-win64.zip

      - name: unzip love
        run: unzip love-win64.zip -d love12

      - name: create love archive
        run: zip -r game.love *.lua src ui lib config

      - name: fuse Nebulae.exe
        run: |
          mkdir build
          cat love12/love.exe game.love > build/Nebulae.exe

      - name: copy dlls and folders
        run: |
          cp love12/*.dll build/
          cp -r assets build/
          cp -r plugins build/

      - name: upload artifact (Windows)
        uses: actions/upload-artifact@main
        with:
          name: Nebulae-Windows-x64
          path: build/

  fuse-linux:
    runs-on: ubuntu-22.04
    name: Build for Linux

    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: download love 12.0 AppImage
        run: |
          curl -L -o love12.AppImage https://coolestperson.me/public/love-12.0-x86_64.AppImage
          chmod +x love12.AppImage
          ./love12.AppImage --appimage-extract
          mv squashfs-root love12-extracted

      - name: create love archive
        run: zip -r game.love *.lua src ui lib config

      - name: setup Nebulae.AppDir
        run: |
          mkdir -p Nebulae.AppDir/usr/bin
          cp love12-extracted/usr/bin/love Nebulae.AppDir/usr/bin/
          cp game.love Nebulae.AppDir/usr/bin/
          echo -e '#!/bin/bash\nexec "$(dirname "$0")/love" "$(dirname "$0")/game.love" "$@"' > Nebulae.AppDir/AppRun
          chmod +x Nebulae.AppDir/AppRun
          cp love12-extracted/love.svg Nebulae.AppDir/
          cat > Nebulae.AppDir/Nebulae.desktop <<EOF
          [Desktop Entry]
          Name=Nebulae
          Exec=Nebulae
          Icon=love
          Type=Application
          Categories=Game;
          EOF

      - name: download linuxdeploy
        run: |
          curl -L -o linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage
          ./linuxdeploy.AppImage --appimage-extract
          mv squashfs-root/usr/bin/linuxdeploy .

      - name: build AppImage
        run: |
          ./linuxdeploy --appdir Nebulae.AppDir --output appimage
          mkdir -p build/linux
          mv Nebulae-x86_64.AppImage build/linux/Nebulae.AppImage

      - name: upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: Nebulae-Linux-x64
          path: build/linux/
